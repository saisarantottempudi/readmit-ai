name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests flows scripts
      - name: Format check
        run: ruff format --check src tests flows scripts
      - name: Type check
        run: mypy src
      - name: Tests
        run: pytest --cov=src/readmit --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          tags: ${{ env.IMAGE_BASE }}/api:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build jobs image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.jobs
          tags: ${{ env.IMAGE_BASE }}/jobs:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy scan (API image)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_BASE }}/api:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Log in to ghcr.io
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push images
        if: github.ref == 'refs/heads/main'
        run: |
          for name in api jobs; do
            docker tag $IMAGE_BASE/$name:${{ github.sha }} $IMAGE_BASE/$name:latest
            docker push $IMAGE_BASE/$name:${{ github.sha }}
            docker push $IMAGE_BASE/$name:latest
          done
