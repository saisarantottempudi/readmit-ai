services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: readmit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-readmit}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readmit"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    command: >
      mlflow server
      --backend-store-uri postgresql://readmit:${POSTGRES_PASSWORD:-readmit}@postgres/mlflow
      --artifacts-destination /mlartifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5001:5000"
    volumes:
      - mlartifacts:/mlartifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  prefect:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://readmit:${POSTGRES_PASSWORD:-readmit}@postgres/prefect
    ports:
      - "4200:4200"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - shared-data:/data
      - shared-reports:/reports
    depends_on:
      mlflow:
        condition: service_healthy

  jobs:
    build:
      context: .
      dockerfile: docker/Dockerfile.jobs
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PREFECT_API_URL: http://prefect:4200/api
      MONITOR_INTERVAL: ${MONITOR_INTERVAL:-300}
    volumes:
      - shared-data:/data
      - shared-reports:/reports
    depends_on:
      mlflow:
        condition: service_healthy
      prefect:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  reports:
    image: nginx:alpine
    volumes:
      - shared-reports:/usr/share/nginx/html:ro
    ports:
      - "8081:80"

volumes:
  pgdata:
  mlartifacts:
  shared-data:
  shared-reports:
